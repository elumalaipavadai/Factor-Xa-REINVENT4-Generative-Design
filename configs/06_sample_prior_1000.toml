# STEP 06A: Sample 1000 molecules from the original REINVENT prior
#
# Purpose:
# Create a fair baseline for comparison against the FXA transfer-learned model.

run_type = "sampling"
device = "cpu"

json_out_config = "results/metrics/06_sample_prior_1000_config.json"

[parameters]

model_file = "external/REINVENT4/priors/reinvent.prior"

sample_strategy = "multinomial"
temperature = 1.0

output_file = "data/generated/reinvent_prior_1000.csv"

num_smiles = 1000
unique_molecules = true
randomize_smiles = true