# STEP 04B: REINVENT4 transfer-learning sanity run
#
# Purpose:
# Fine-tune the official REINVENT prior using potent, stereo-free,
# all-flat Factor Xa seed molecules.
#
# This is a short CPU sanity run, not the final production TL run.

run_type = "transfer_learning"
device = "cpu"

tb_logdir = "results/tensorboard/tb_TL_fxa_pki8_all_flat_sanity"
json_out_config = "results/metrics/04_tl_fxa_pki8_all_flat_sanity_config.json"

[parameters]

num_epochs = 5
save_every_n_epochs = 1
batch_size = 50
sample_batch_size = 1000

input_model_file = "external/REINVENT4/priors/reinvent.prior"
output_model_file = "models/fxa_reinvent_tl_pki8_all_flat_sanity.model"

smiles_file = "data/reference/tl_split/fxa_tl_train_pki8_all_flat_elements.smi"
validation_smiles_file = "data/reference/tl_split/fxa_tl_valid_pki8_all_flat_elements.smi"

# We already curated with RDKit and removed stereo tokens.
standardize_smiles = false

# Data augmentation during TL.
randomize_smiles = true
randomize_all_smiles = false

# TensorBoard diversity diagnostic.
internal_diversity = true
